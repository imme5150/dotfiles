###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, exec, firefox
bind = $mainMod, C, exec, google-chrome
bind = $mainMod, Q, killactive,
bind = $mainMod, 0, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, amixer sset Master on 5%+
bindel = ,XF86AudioLowerVolume, exec, amixer sset Master on 5%-
bindel = ,XF86AudioMute, exec, amixer sset Master toggle
binde = ,XF86AudioMicMute, exec, pamixer --default-source -t
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -n1 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl  -n1 set 10%-

bindel = ,code:125, exec, hyprctl dispatch dpms toggle

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Blank out screen
bindl = $mainMod, Escape, exec, ~/.config/hypr/scripts/toggle_screen.sh
bindl = $mainMod SHIFT, Escape, exec, hyprctl dispatch dpms toggle


##############################
###         OTHERS         ###
##############################

bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, Print, exec, grim
bind = CTRL SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy  # bind = $mainMod, V, exec, clipman pick -t wofi
bind = $mainMod SHIFT, C, exec, $colorpicker –-autocopy
bind = CTRL ALT, Delete, exec, $powermenu
bind = $mainMod, L, exec, $lockscreen

bind = $mainMod, N, exec, kitty -e nmtui
bind = $mainMod SHIFT, N, exec, killall waybar && hyprctl dispatch -- exec $taskbar

bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod, A, exec, hyprshot -m region
bind = $mainMod SHIFT, A, exec, hyprshot -m window -m active
bind = $mainMod, M, exec, hyprctl keyword "device[dell08ba:00-0488:121f-touchpad]:enabled" false
bind = $mainMod SHIFT, M, exec, hyprctl keyword "device[dell08ba:00-0488:121f-touchpad]:enabled" true
bind = $mainMod, V, exec, [float; center] kitty protonvpn-cli connect
bind = $mainMod SHIFT, V, exec, protonvpn-cli disconnect

# Blue light filter
bind = $mainMod ALT, Up, exec, hyprctl keyword decoration:screen_shader ~/.config/hypr/screenShader.frag
bind = $mainMod ALT, Down, exec, hyprctl reload

bind = $mainMod SHIFT, O, exec, hyprctl hyprsunset temperature 2500
bind = $mainMod SHIFT, L, exec, hyprctl hyprsunset identity

# bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
# bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10
